<style>
:root{--bp:#FAF9F6;--bs:#F0EFEB;--bc:#FFF;--bch:#FFFDF8;--bi:#FFF;--bmo:rgba(26,26,24,.5);--t1:#1A1A18;--t2:#6B6B63;--t3:#9C9C94;--ac:#C8962E;--ach:#B8861E;--acl:rgba(200,150,46,.12);--act:#FFF;--a2:#0D7C66;--a2l:rgba(13,124,102,.1);--bd:#E5E4E0;--bdf:#C8962E;--bdi:#D4D3CE;--ss:0 1px 3px rgba(0,0,0,.06);--sm:0 4px 14px rgba(0,0,0,.08);--sl:0 10px 30px rgba(0,0,0,.12);--sx:0 20px 50px rgba(0,0,0,.16);--pl:#9CA3AF;--pm:#D4A017;--ph:#EA580C;--pu:#DC2626;--ok:#16A34A;--dg:#DC2626;--wn:#D97706;--inf:#2563EB;--rs:6px;--rm:10px;--rl:16px;--rx:20px;--tr:.2s cubic-bezier(.4,0,.2,1)}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.pb{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}

.sp.syncing{background:var(--wn);animation:spp 1.2s infinite}.sp.synced{background:var(--ok)}.sp.pending{background:var(--wn)}.sp.offline{background:var(--t3)}
@keyframes spp{0%,100%{opacity:1}50%{opacity:.4}}

.fi{animation:fi .3s ease}.su{animation:su .4s ease}.irm{animation:fo .3s ease forwards}
.ibo{opacity:.55}.ibo .inm{text-decoration:line-through;text-decoration-color:var(--t3)}
.sbar{height:4px;background:var(--bd);border-radius:2px;overflow:hidden;width:120px}
.sf{height:100%;border-radius:2px;transition:width .4s,background .4s}
.wz-step{display:none}.wz-step.active{display:block}
.wz-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all var(--tr);border:2px solid var(--bd);color:var(--t3);background:var(--bc)}
.wz-dot.done{background:var(--ok);border-color:var(--ok);color:#fff}
.wz-dot.cur{background:var(--ac);border-color:var(--ac);color:#fff}
.wz-line{flex:1;height:2px;background:var(--bd);transition:background var(--tr)}.wz-line.done{background:var(--ok)}
.google-btn{display:inline-flex;align-items:center;gap:10px;padding:10px 20px;border-radius:var(--rm);border:1px solid var(--bd);background:var(--bc);cursor:pointer;font-size:14px;font-weight:500;color:var(--t1);transition:all var(--tr);min-height:44px}
.google-btn:hover{box-shadow:var(--sm);transform:translateY(-1px)}
.google-btn img{width:18px;height:18px}
@media(max-width:640px){.mc{max-height:95vh;border-radius:var(--rl)}.tc{left:12px;right:12px;bottom:12px;max-width:none;width:auto}.wt{font-size:13px}.wt th,.wt td{padding:8px 6px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

<body>
<div id="app" role="application" aria-label="WishVault"></div>
<div id="mr" aria-live="polite"></div>

<button class="wb wb0" style="position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);color:#fff;border-radius:50%;min-width:44px;min-height:44px" data-a="clb" aria-label="Close"><i data-lucide="x" style="width:20px;height:20px"></i></button>
</div>
<script>
/* ===== CONSTANTS ===== */
const CUR=[{c:'EUR',s:'€',l:'de-DE'},{c:'USD',s:'$',l:'en-US'},{c:'GBP',s:'£',l:'en-GB'},{c:'JPY',s:'¥',l:'ja-JP'},{c:'CAD',s:'C$',l:'en-CA'},{c:'AUD',s:'A$',l:'en-AU'},{c:'CHF',s:'CHF',l:'de-CH'},{c:'CNY',s:'¥',l:'zh-CN'},{c:'SEK',s:'kr',l:'sv-SE'},{c:'NOK',s:'kr',l:'nb-NO'},{c:'DKK',s:'kr',l:'da-DK'},{c:'PLN',s:'zł',l:'pl-PL'},{c:'BRL',s:'R$',l:'pt-BR'},{c:'MXN',s:'MX$',l:'es-MX'},{c:'INR',s:'₹',l:'en-IN'},{c:'KRW',s:'₩',l:'ko-KR'}];
const PRI=[{v:'low',lb:'Low'},{v:'medium',lb:'Medium'},{v:'high',lb:'High'},{v:'urgent',lb:'Urgent'}];
const SK={I:'wv_i',C:'wv_c',T:'wv_t',S:'wv_s',B:'wv_b',BD:'wv_bd',SL:'wv_sl',DM:'wv_dm'};
const AD=30,SD=180,ED=7,TD=5000,BI=864e5;

/* ===== UTILS ===== */
const uuid=()=>'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16)});
const ci=code=>CUR.find(c=>c.c===code)||CUR[0];
const fc=(a,cc)=>{if(a==null||isNaN(a))return'—';const i=ci(cc);try{return new Intl.NumberFormat(i.l,{style:'currency',currency:i.c,minimumFractionDigits:i.c==='JPY'||i.c==='KRW'?0:2}).format(a)}catch{return i.s+a}};
const fd=ds=>{if(!ds)return'—';try{return new Intl.DateTimeFormat('en-US',{year:'numeric',month:'short',day:'numeric'}).format(new Date(ds))}catch{return ds}};
const fdt=ds=>{if(!ds)return'—';try{return new Intl.DateTimeFormat('en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}).format(new Date(ds))}catch{return ds}};
const db=(d1,d2)=>Math.floor(Math.abs(new Date(d2)-new Date(d1))/864e5);
const iwd=(ds,d)=>{if(!ds)return false;const df=db(new Date().toISOString(),ds);return df>=0&&df<=d};
const dbnc=(fn,d)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),d)}};
const eh=s=>{if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')};
const ce=v=>`"${String(v??'').replace(/"/g,'""')}"`;
const sumb=()=>{let t=0;for(let k in localStorage)if(localStorage.hasOwnProperty(k))t+=localStorage[k].length*2;return t/1048576};
async function compImg(file,mw=800,q=.7){return new Promise((res,rej)=>{const r=new FileReader;r.onerror=()=>rej(new Error('Read failed'));r.onload=e=>{const img=new Image;img.onerror=()=>rej(new Error('Invalid image'));img.onload=()=>{const cv=document.createElement('canvas');let w=img.width,h=img.height;if(w>mw){h=h*mw/w;w=mw}cv.width=Math.max(1,Math.round(w));cv.height=Math.max(1,Math.round(h));cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);res(cv.toDataURL('image/jpeg',q))};img.src=e.target.result};r.readAsDataURL(file)})}
function getOrigin(){try{return window.location.origin}catch{return'https://yourusername.github.io'}}

/* ===== REACTIVE STORE ===== */
class Store{constructor(i){this._s=JSON.parse(JSON.stringify(i));this._l=[]}get(){return this._s}set(p){this._s={...this._s,...p};this._l.forEach(f=>f(this._s))}sub(fn){this._l.push(fn);return()=>{this._l=this._l.filter(l=>l!==fn)}}}
const S=new Store({items:[],cats:[],tags:[],set:{theme:'light',gcid:'',vm:'grid',so:'dateAdded',sd:'desc',tab:'wishlist',fcat:'',fpri:'',ftag:'',sq:'',bm:false,sids:[]},ss:'offline',pc:0,us:[]});

/* ===== STORAGE SERVICE ===== */
const SS={load(){try{S.set({items:JSON.parse(localStorage.getItem(SK.I)||'[]'),cats:JSON.parse(localStorage.getItem(SK.C)||'[]'),tags:JSON.parse(localStorage.getItem(SK.T)||'[]'),set:{...S.get().set,...JSON.parse(localStorage.getItem(SK.S)||'{}')}})}catch(e){console.error(e)}},si(v){localStorage.setItem(SK.I,JSON.stringify(v))},sc(v){localStorage.setItem(SK.C,JSON.stringify(v))},st(v){localStorage.setItem(SK.T,JSON.stringify(v))},ss(v){localStorage.setItem(SK.S,JSON.stringify(v))},save(){const s=S.get();this.si(s.items);this.sc(s.cats);this.st(s.tags);this.ss(s.set)}};

/* ===== BACKUP SERVICE ===== */
const BS={auto(){const lb=localStorage.getItem(SK.BD);if(!lb||(Date.now()-parseInt(lb))>BI)this.snap()},snap(){const s=S.get();localStorage.setItem(SK.B,JSON.stringify({items:s.items,cats:s.cats,tags:s.tags,ts:new Date().toISOString()}));localStorage.setItem(SK.BD,String(Date.now()))},restore(){try{return JSON.parse(localStorage.getItem(SK.B))}catch{return null}},date(){const d=localStorage.getItem(SK.BD);return d?new Date(parseInt(d)).toLocaleString():null}};

/* ===== TOAST SERVICE ===== */
const TS={_t:[],show(msg,type='info',undo=null,dur=TD){const id=uuid();this._t.push({id,msg,type,undo,dur});this._r();if(dur>0)setTimeout(()=>this.rm(id),dur);return id},rm(id){const el=document.querySelector(`[data-tid="${id}"]`);if(el){el.classList.add('rm');setTimeout(()=>{this._t=this._t.filter(t=>t.id!==id);this._r()},300)}else{this._t=this._t.filter(t=>t.id!==id);this._r()}},_r(){const r=document.getElementById('tr');const im={success:'check-circle',danger:'alert-circle',warning:'alert-triangle',info:'info'};const cm={success:'var(--ok)',danger:'var(--dg)',warning:'var(--wn)',info:'var(--inf)'};r.innerHTML=this._t.map(t=>`<div class="tt" data-tid="${t.id}" role="status"><i data-lucide="${im[t.type]||'info'}" style="width:18px;height:18px;color:${cm[t.type]||cm.info};flex-shrink:0"></i><span style="flex:1">${eh(t.msg)}</span>${t.undo?`<button class="wb wb2 wbs" data-a="ut" data-tid="${t.id}">Undo</button>`:''}<button class="wb wb0 wbs wbi" data-a="dt" data-tid="${t.id}" style="min-width:32px;min-height:32px" aria-label="Dismiss"><i data-lucide="x" style="width:14px;height:14px"></i></button></div>`).join('');lucide.createIcons({nodes:r.querySelectorAll('[data-lucide]')})}};

/* ===== IMAGE SERVICE ===== */
const IS={open(u){if(!u)return;document.getElementById('li').src=u;document.getElementById('lr').classList.add('on');document.getElementById('lr').focus()},close(){document.getElementById('lr').classList.remove('on');document.getElementById('li').src=''}};

/* ===== EXPORT/IMPORT SERVICE ===== */
const EIS={_dl(b,f){const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=f;a.click();URL.revokeObjectURL(u)},
ej(){const s=S.get();this._dl(new Blob([JSON.stringify({v:1,at:new Date().toISOString(),items:s.items,cats:s.cats,tags:s.tags},null,2)],{type:'application/json'}),'wishvault_export.json');TS.show('Exported as JSON','success')},
ec(){const s=S.get();const h=['Name','Price','Currency','Quantity','Category','Priority','Tags','Shop Link','Status','Date Added','Date Bought','Event Date','Notes'];const rows=s.items.map(i=>[i.name,i.averagePrice||'',i.currency,i.quantity,i.category,i.priority,i.tags.join('; '),i.shopLink||'',i.isBought?'Bought':'Wanted',i.dateAdded,i.dateBought||'',i.eventDate||'',i.notes||'']);this._dl(new Blob(['\uFEFF'+[h.join(','),...rows.map(r=>r.map(ce).join(','))].join('\n')],{type:'text/csv;charset=utf-8;'}),'wishvault_export.csv');TS.show('Exported as CSV','success')},
/* Quick Sync: Share file directly to Google Drive on mobile, or download on desktop */
async quickSync(){const s=S.get();const data=JSON.stringify({v:1,at:new Date().toISOString(),items:s.items,cats:s.cats,tags:s.tags},null,2);const blob=new Blob([data],{type:'application/json'});const file=new File([blob],'wishvault_backup.json',{type:'application/json'});
if(navigator.canShare&&navigator.canShare({files:[file]})){try{await navigator.share({files:[file],title:'WishVault Backup',text:'My WishVault wishlist backup'});TS.show('Shared! Save to Google Drive from the share sheet','success',null,3e3)}catch(e){if(e.name!=='AbortError')this._fallbackDl(blob)}}else{this._fallbackDl(blob)}},
_quickImport(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(f)this.ij(f)};inp.click()},

case 'tsi':{let sids=[...S.get().set.sids];const idx=sids.indexOf(v);if(idx>=0)sids.splice(idx,1);else sids.push(v);S.set({set:{...S.get().set,sids}});render();break}
case 'tvm':S.set({set:{...S.get().set,vm:S.get().set.vm==='grid'?'table':'grid'}});render();break;
case 'tsd':S.set({set:{...S.get().set,sd:S.get().set.sd==='desc'?'asc':'desc'}});render();break;
case 'stab':S.set({set:{...S.get().set,tab:v,sids:[],bm:false}});render();break;
case 'os':showSettings();break;
case 'ocm':showCatMgr();break;
case 'st':{S.set({set:{...S.get().set,theme:v}});document.documentElement.setAttribute('data-theme',v);SS.ss(S.get().set);break}
/* Quick Sync */
case 'qs':EIS.quickSync();break;
case 'qi':EIS._quickImport();break;
/* Wizard */
case 'swz':closeM();showWizard();break;
case 'wzn':if(_wzStep<_wzTotal){_wzStep++;renderWizard()}break;
case 'wzp':if(_wzStep>1){_wzStep--;renderWizard()}break;
case 'copy-origin':{const origin=getOrigin();navigator.clipboard.writeText(origin).then(()=>TS.show('Origin copied!','success',null,1500)).catch(()=>{});break}
case 'wzconn':{const cid=document.getElementById('wzcid').value.trim();const err=document.getElementById('wzerr');if(!cid||!cid.includes('.googleusercontent.com')){err.textContent='Invalid Client ID format. It should look like: 123456-abc.apps.googleusercontent.com';err.style.display='block';return}err.style.display='none';S.set({set:{...S.get().set,gcid:cid}});SS.ss(S.get().set);const btn=document.getElementById('wzconn');btn.disabled=true;btn.innerHTML='<i data-lucide="loader-2" style="width:16px;height:16px;animation:spp 1s infinite"></i> Connecting...';lucide.createIcons({nodes:[btn]});Sync.init();Sync.auth().then(ok=>{if(ok){Sync.setup().then(done=>{if(done){TS.show('Connected to Google Drive!','success');closeM();render()}else{btn.disabled=false;btn.innerHTML='Connect with Google';lucide.createIcons({nodes:[btn]});TS.show('Setup failed at Drive folder creation','danger')}});return}btn.disabled=false;btn.innerHTML='Connect with Google';lucide.createIcons({nodes:[btn]})});break}
/* Auto sync actions */
case 'dd':Sync.disc();closeM();render();break;
case 'sn':Sync.try();break;
/* Export */
case 'ej':EIS.ej();break;
case 'ec':EIS.ec();break;
/* Backup */
case 'cb':BS.snap();TS.show('Backup created','success',null,2e3);render();break;
case 'rb':{const bk=BS.restore();if(!bk){TS.show('No backup to restore','warning');break}showConfirm('Restore from last backup? Replaces all current data.',()=>{S.set({items:bk.items,cats:bk.cats||S.get().cats,tags:bk.tags||S.get().tags,us:[...S.get().us.slice(-9),{items:S.get().items}]});SS.save();TS.show('Backup restored','success',null,2e3);render()});break}
/* Price log */
case 'lp':{const it=S.get().items.find(i=>i.id===v);if(it)showPriceLog(it);break}
case 'snp':{const npi=document.getElementById('npi');if(!npi||!npi.value){TS.show('Enter a price','warning');break}WL.logP(v,parseFloat(npi.value));closeM();render();TS.show('Price logged','success',null,2e3);break}
case 'tpd':WL.togPD(v);render();break;
case 'si':{const it=S.get().items.find(i=>i.id===v);if(it)shareItem(it);break}
case 'oi':IS.open(v);break;
case 'clb':IS.close();break;
/* Bulk */
case 'bmb':{const s=S.get();if(s.set.sids.length)WL.bulk(s.set.sids,'mb');TS.show('Marked as bought','success',null,2e3);render();break}
case 'bdel':{const s=S.get();if(!s.set.sids.length)break;showConfirm('Delete '+s.set.sids.length+' items?',()=>{const snap=WL.del(s.set.sids);TS.show(s.set.sids.length+' items deleted','info',()=>{S.set({items:snap.items});SS.si(snap.items);render()})});break}
/* Filters */
case 'fc':S.set({set:{...S.get().set,fcat:v}});render();break;
case 'fp':S.set({set:{...S.get().set,fpri:v}});render();break;
case 'ft':S.set({set:{...S.get().set,ftag:v}});render();break;
case 'so':S.set({set:{...S.get().set,so:v}});render();break;
/* Category mgr */
case 'cc':{const inp=document.getElementById('nci');if(!inp||!inp.value.trim())break;WL.mgCat(null,inp.value.trim(),'create');closeM();showCatMgr();render();break}
case 'rc':{openM(`<div style="padding:24px"><h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Rename Category</h2><input class="wi" id="rni" type="text" value="${eh(v)}" maxlength="40" style="margin-bottom:16px"><div style="display:flex;gap:10px;justify-content:flex-end"><button class="wb wb0" data-a="cm">Cancel</button><button class="wb wb1" id="rnbtn">Rename</button></div></div>`,'380px');document.getElementById('rnbtn').addEventListener('click',()=>{const nv=document.getElementById('rni').value.trim();if(nv&&nv!==v){WL.mgCat(v,nv,'rename');TS.show('Renamed','success',null,1500)}closeM();render()});break}
case 'dc':{showConfirm('Delete category "'+v+'"?',()=>{WL.mgCat(v,null,'delete');TS.show('Deleted','success',null,1500);closeM();render()});break}
/* Item form inline */
case 'mac':{openM(`<div style="padding:24px"><h2 style="font-size:18px;font-weight:700;margin-bottom:16px">New Category</h2><input class="wi" id="mnci" type="text" placeholder="Category name..." maxlength="40" style="margin-bottom:16px"><div style="display:flex;gap:10px;justify-content:flex-end"><button class="wb wb0" data-a="cm">Cancel</button><button class="wb wb1" id="mncbtn">Create</button></div></div>`,'360px');document.getElementById('mncbtn').addEventListener('click',()=>{const nv=document.getElementById('mnci').value.trim();if(nv){WL.mgCat(null,nv,'create');const sel=document.getElementById('ifca');if(sel){const opt=document.createElement('option');opt.value=nv;opt.textContent=nv;sel.appendChild(opt);sel.value=nv}TS.show('Created','success',null,1500)}closeM()});break}
case 'mati':{const inp=document.getElementById('ifnt');if(!inp||!inp.value.trim())break;WL.mgTag(inp.value.trim(),'create');const ta=document.getElementById('mta');if(ta){const lb=document.createElement('label');lb.style.cssText='display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--a2l);border-radius:99px;font-size:12px;cursor:pointer';lb.innerHTML=`<input type="checkbox" value="${eh(inp.value.trim())}" checked class="mtc" style="accent-color:var(--a2)">${eh(inp.value.trim())}`;ta.appendChild(lb)}inp.value='';break}
case 'mri':{const mip=document.getElementById('mip');if(mip)mip.remove();break}
/* Import */
case 'im':if(_id)EIS.apply(_id,'merge');closeM();render();break;
case 'ir':if(_id)EIS.apply(_id,'replace');closeM();render();break;
/* Toast */
case 'ut':{const toast=TS._t.find(x=>x.id===t.dataset.tid);if(toast&&toast.undo){toast.undo();TS.rm(t.dataset.tid)}break}
case 'dt':TS.rm(t.dataset.tid);break}
});

document.addEventListener('change',e=>{const t=e.target;if(!t)return;if(t.id==='bcs'&&t.value){WL.bulk(S.get().set.sids,'sc',t.value);TS.show('Category updated','success',null,2e3);render()}if(t.id==='bps'&&t.value){WL.bulk(S.get().set.sids,'sp',t.value);TS.show('Priority updated','success',null,2e3);render()}});
document.addEventListener('submit',e=>{if(e.target.id==='ifm'){e.preventDefault();submitItemForm()}});
document.addEventListener('change',e=>{if(e.target.dataset.a==='ijf'){const f=e.target.files[0];if(f)EIS.ij(f);e.target.value=''}if(e.target.id==='ifif'){const f=e.target.files[0];if(!f)return;compImg(f).then(b64=>{const ex=document.getElementById('mip');if(ex)ex.src=b64;else{const urlInp=document.getElementById('ifiu');if(urlInp){const w=document.createElement('div');w.style.cssText='margin-top:8px;position:relative;display:inline-block';w.innerHTML=`<img src="${b64}" alt="Preview" style="max-width:120px;max-height:80px;border-radius:var(--rs);border:1px solid var(--bd);object-fit:cover" id="mip"><button type="button" class="wb wb0 wbi" data-a="mri" style="position:absolute;top:-6px;right:-6px;background:var(--bc);border:1px solid var(--bd);border-radius:50%;min-width:24px;min-height:24px"><i data-lucide="x" style="width:12px;height:12px"></i></button>`;urlInp.parentElement.parentElement.appendChild(w);lucide.createIcons({nodes:w.querySelectorAll('[data-lucide]')})}}TS.show('Image added','success',null,1500)}).catch(()=>TS.show('Failed to process image','danger'));e.target.value=''}});
document.getElementById('lr').addEventListener('click',e=>{if(e.target===e.currentTarget)IS.close()});
document.addEventListener('mousedown',e=>{const t=e.target.closest('[data-a="dh"]');if(t)DM.start(e,t.dataset.v)});
document.addEventListener('mousemove',e=>DM.move(e));
document.addEventListener('mouseup',()=>DM.end());
document.addEventListener('touchstart',e=>{const t=e.target.closest('[data-a="dh"]');if(t)DM.start(e,t.dataset.v)},{passive:true});
document.addEventListener('touchmove',e=>DM.move(e.touches[0]),{passive:false});
document.addEventListener('touchend',()=>DM.end());
document.addEventListener('keydown',e=>{if((e.key===' '||e.key==='Enter')&&e.target.classList.contains('cb')){e.preventDefault();e.target.click()}});

/* ===== INIT ===== */
DM.init(reorder);SS.load();document.documentElement.setAttribute('data-theme',S.get().set.theme);BS.auto();Sync.init();S.sub(render);render();
</script>
</body>
</html>
